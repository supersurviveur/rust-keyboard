[build]
target = "./atmega32u4-none.json"

[unstable]
json-target-spec = true
build-std = [ "core" ]

[target.atmega32u4-none]
rustflags = [ "-C", "target-feature=+crt-static", "-C", "target-cpu=atmega32u4", "-Zlocation-detail=none", "-Zfmt-debug=none" ]

[env]
AVR_CPU_FREQUENCY_HZ="16000000"
F_CPU="16000000"
ARCH="ARCH_AVR8"
BOARD="BOARD_USBKEY"
MMCU="atmega32u4"
LUFA_CONFIG_PATH = { value = ".", relative = true }
